name: build

on: [push, pull_request]

jobs:
  build:
    runs-on: windows-latest
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        submodules: 'recursive'

    - name: Setup Ninja
      uses: seanmiddleditch/gha-setup-ninja@master

    - name: Setup MSVC
      uses: ilammy/msvc-dev-cmd@v1

    - name: Download Skia (precompiled binaries)
      shell: bash
      run: |
        SKIA_URL="https://github.com/aseprite/skia/releases/download/m102-861e4743af/Skia-Windows-Release-x64.zip"
        echo "Downloading Skia from $SKIA_URL"
        curl -L -f -o skia.zip "$SKIA_URL"
        if [ $? -ne 0 ]; then
          echo "Failed to download Skia"
          exit 1
        fi
        7z x skia.zip -oskia/ -y
        echo "Skia extracted successfully"

    - name: Download missing ICU data file
      shell: bash
      run: |
        mkdir -p skia/third_party/externals/icu/flutter
        curl -L -o skia/third_party/externals/icu/flutter/icudtl.dat \
          https://raw.githubusercontent.com/aseprite/skia/m102/third_party/externals/icu/flutter/icudtl.dat
        if [ $? -ne 0 ]; then
          echo "Failed to download icudtl.dat"
          exit 1
        fi

    - name: Download missing third‑party headers (libjpeg-turbo)
      shell: bash
      run: |
        # 直接克隆 m102 分支，仅保留最近一次提交，使用 sparse checkout
        git clone --depth=1 --filter=blob:none --sparse --branch m102 \
          https://github.com/aseprite/skia.git skia-src
        cd skia-src
        git sparse-checkout set third_party/externals/libjpeg-turbo
        cd ..
        mkdir -p skia/third_party/externals
        cp -r skia-src/third_party/externals/libjpeg-turbo skia/third_party/externals/
        rm -rf skia-src
        echo "libjpeg-turbo headers copied"

    - name: Generate Makefiles (CMake)
      shell: bash
      run: |
        SKIA_DIR="${{ github.workspace }}/skia"
        cmake -S . -B build -G Ninja \
          -DCMAKE_BUILD_TYPE=Release \
          -DENABLE_UI=on \
          -DENABLE_CCACHE=off \
          -DLAF_BACKEND=skia \
          -DSKIA_DIR="$SKIA_DIR" \
          -DSKIA_LIBRARY_DIR="$SKIA_DIR/out/Release-x64" \
          -DSKIA_LIBRARY="$SKIA_DIR/out/Release-x64/skia.lib"

    - name: Compile Aseprite
      shell: bash
      run: |
        cd build && ninja

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: aseprite-windows
        path: |
          build/bin/data
          build/bin/aseprite.exe

name: build

on: [push, pull_request]

jobs:
  build:
    runs-on: windows-latest
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        submodules: 'recursive'

    - name: Setup Ninja
      uses: seanmiddleditch/gha-setup-ninja@master

    - name: Setup MSVC
      uses: ilammy/msvc-dev-cmd@v1

    - name: Download Skia (m102)
      shell: bash
      run: |
        # 使用正确的 m102 下载链接
        SKIA_URL="https://github.com/aseprite/skia/releases/download/m102-861e4743af/Skia-Windows-Release-x64.zip"
        echo "Downloading Skia from $SKIA_URL"
        curl -L -f -o skia.zip "$SKIA_URL"
        if [ $? -ne 0 ]; then
          echo "Failed to download Skia"
          exit 1
        fi
        # 解压到 skia/ 目录
        7z x skia.zip -oskia/ -y
        # 验证解压后的结构（方便调试）
        ls -R skia/ | head -20

    - name: Generate Makefiles (CMake)
      shell: bash
      run: |
        cmake -S . -B build -G Ninja \
          -DCMAKE_BUILD_TYPE=Release \
          -DENABLE_UI=on \
          -DENABLE_CCACHE=off \
          -DLAF_BACKEND=skia \
          -DSKIA_DIR=./skia \
          -DSKIA_LIBRARY_DIR=./skia/out/Release-x64 \
          -DSKIA_LIBRARY=./skia/out/Release-x64/skia.lib

    - name: Compile Aseprite
      shell: bash
      run: |
        cd build && ninja

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: aseprite-windows
        path: |
          build/bin/data
          build/bin/aseprite.exe
